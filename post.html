<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>게시글 | 태커</title>
<meta name="description" content="태성고등학교 학생들을 위한 익명 커뮤니티 태커의 게시글입니다.">
<meta name="theme-color" content="#2563EB">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<!-- =====================================================
     HEADER
===================================================== -->
<header class="header">

    <div class="header-left">
        <button class="nav-toggle" id="menuBtn" aria-label="메뉴 열기">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 6H21M3 12H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>

        <a href="index.html" class="brand">
            <h1>태커</h1>
            <span>태성고등학교 커뮤니티</span>
        </a>
    </div>

    <div class="header-actions">

        <button class="icon-btn" id="themeToggleBtn" aria-label="다크모드 전환">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M12 2V4M12 20V22M4 12H2M22 12H20M5 5L6.5 6.5M18 18L19.5 19.5M19.5 5L18 6.5M6.5 18L5 19.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>

        <div class="dropdown" id="notifDropdown">
            <button class="icon-btn dropdown-trigger" id="notifBtn" aria-haspopup="true" aria-expanded="false" aria-label="알림">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M15 17H20L18.5 15.5V10C18.5 6.96 16.54 4.36 13.75 3.45V3C13.75 2.03 12.97 1.25 12 1.25C11.03 1.25 10.25 2.03 10.25 3V3.45C7.46 4.36 5.5 6.96 5.5 10V15.5L4 17H9" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M9 17C9 18.66 10.34 20 12 20C13.66 20 15 18.66 15 17" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span class="badge-dot hidden" id="notifBadge"></span>
            </button>

            <div class="dropdown-menu dropdown-menu-right" id="notifMenu">
                <div class="dropdown-header">알림</div>
                <div class="dropdown-empty" id="notifEmpty">
                    <p>새로운 알림이 없습니다.</p>
                </div>
                <div class="dropdown-list hidden" id="notifList"></div>
            </div>
        </div>

        <button class="btn btn-write" id="headerWriteBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>글쓰기</span>
        </button>

        <div class="auth-area" id="authArea">
            <a href="login.html" class="btn btn-ghost">로그인</a>
            <a href="register.html" class="btn">회원가입</a>
        </div>

        <div class="dropdown hidden" id="profileDropdown">
            <button class="profile-trigger" id="profileBtn" aria-haspopup="true" aria-expanded="false">
                <span class="avatar-sm" id="headerAvatar">
                    <img src="" alt="" id="headerAvatarImg" class="hidden">
                    <span id="headerAvatarInitial">태</span>
                </span>
                <span class="profile-trigger-name" id="headerNickname">회원</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <div class="dropdown-menu dropdown-menu-right" id="profileMenu">
                <div class="dropdown-profile-summary">
                    <span class="avatar-sm avatar-sm-lg">
                        <img src="" alt="" id="menuAvatarImg" class="hidden">
                        <span id="menuAvatarInitial">태</span>
                    </span>
                    <div>
                        <p class="dropdown-profile-name" id="menuNickname">회원</p>
                        <p class="dropdown-profile-email" id="menuEmail">-</p>
                    </div>
                </div>
                <div class="dropdown-divider"></div>
                <a href="mypage.html" class="dropdown-item">마이페이지</a>
                <a href="#" class="dropdown-item" data-soon="설정 기능은 준비 중입니다.">설정</a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item dropdown-item-danger" id="logoutBtn">로그아웃</button>
            </div>
        </div>

    </div>

</header>

<!-- =====================================================
     SIDEBAR
===================================================== -->
<aside class="sidebar" id="sidebar">
    <nav>
        <ul>
            <li><a href="index.html">홈</a></li>
            <li><a href="board.html" class="active">게시판</a></li>
            <li><a href="board.html?category=free">자유게시판</a></li>
            <li><a href="board.html?category=question">질문게시판</a></li>
            <li><a href="board.html?category=info">정보게시판</a></li>
            <li><a href="school.html?tab=timetable">시간표</a></li>
            <li><a href="school.html?tab=meal">급식</a></li>
            <li><a href="school.html?tab=schedule">학사일정</a></li>
            <li><a href="mypage.html">마이페이지</a></li>
        </ul>
    </nav>
</aside>

<!-- =====================================================
     MAIN
===================================================== -->
<main class="container">

    <div id="postDetailWrap">

        <div class="card post-detail-card skeleton-post" aria-hidden="true" id="postSkeleton">
            <div class="skeleton-line skeleton-line-sm"></div>
            <div class="skeleton-line skeleton-line-lg"></div>
            <div class="skeleton-line skeleton-line-md"></div>
            <div class="skeleton-line skeleton-line-md"></div>
        </div>

        <article class="card post-detail-card hidden" id="postDetail">

            <div class="post-detail-category">
                <span class="badge post-category-badge" id="postCategoryBadge">일반</span>
            </div>

            <h1 class="post-detail-title" id="postTitle"></h1>

            <div class="post-detail-meta">
                <span class="post-detail-author" id="postAuthor">익명</span>
                <span>·</span>
                <span id="postDate"></span>
                <span class="post-detail-view-count" id="postViewCount" style="margin-left:auto;"></span>
            </div>

            <div class="post-detail-content" id="postContent"></div>

            <div class="post-detail-footer">
                <button class="like-btn" id="likeBtn" aria-pressed="false">
                    <span id="likeIcon">🤍</span>
                    <span id="likeCount">0</span>
                </button>
                <span class="post-detail-view-count" id="commentCountText"></span>
                <button type="button" class="report-btn" id="reportPostBtn" data-target-type="post" style="margin-left:auto;">🚨 신고</button>
            </div>

        </article>

        <section class="card comment-section hidden" id="commentSection">

            <h3 class="comment-section-title">댓글 <span id="commentSectionCount"></span></h3>

            <form class="comment-form" id="commentForm">
                <div class="input-box" style="flex:1;">
                    <textarea
                        id="commentInput"
                        class="input"
                        rows="2"
                        maxlength="500"
                        placeholder="댓글을 입력하세요"></textarea>
                </div>
                <button type="submit" class="btn" id="commentSubmitBtn">등록</button>
            </form>

            <div class="comment-list" id="commentList"></div>

        </section>

    </div>

</main>

<!-- =====================================================
     신고 모달
===================================================== -->
<div class="modal" id="reportModal">
    <div class="modal-content">

        <h3 style="margin-bottom:6px;">신고하기</h3>
        <p style="color:var(--sub);font-size:13px;margin-bottom:18px;" id="reportModalTarget">이 게시글을 신고합니다.</p>

        <form id="reportForm">

            <div class="form-group">
                <label for="reportReason">신고 사유</label>
                <textarea
                    id="reportReason"
                    class="input"
                    rows="4"
                    maxlength="500"
                    required
                    placeholder="신고 사유를 구체적으로 입력해주세요."></textarea>
            </div>

            <p class="input-message" id="reportFormMessage"></p>

            <div class="write-actions">
                <button type="button" class="btn btn-outline" id="reportCancelBtn">취소</button>
                <button type="submit" class="btn" id="reportSubmitBtn">신고 접수</button>
            </div>

        </form>

    </div>
</div>

<div id="overlay" class="overlay"></div>

<nav class="bottom-nav">
    <a href="index.html">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M3 10L12 3L21 10V20H15V14H9V20H3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span>홈</span>
    </a>

    <a href="board.html" class="active">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <path d="M4 5H20V15H7L4 18V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
        </svg>
        <span>게시판</span>
    </a>

    <a href="school.html?tab=timetable">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M8 8H16M8 12H16M8 16H13" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>시간표</span>
    </a>

    <a href="#" id="bottomNavMy">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="12" cy="8" r="4" stroke="currentColor" stroke-width="2"/>
            <path d="M4 20C4 16.7 7.6 14 12 14C16.4 14 20 16.7 20 20" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>마이</span>
    </a>
</nav>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/app.js"></script>
<script src="js/auth.js"></script>
<script src="js/post.js"></script>

</body>
</html>
