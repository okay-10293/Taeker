<!DOCTYPE html>
<html lang="ko">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>회원가입 | Taecker</title>

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="register-page">

    <div class="register-card">

        <div class="login-header">

            <a
                href="index.html"
                class="login-back btn btn-ghost">

                ← 홈으로

            </a>

            <h1>

                회원가입

            </h1>

            <p>

                태성고등학교 학생 또는 선생님이라면 가입하세요.

            </p>

        </div>

        <form
            id="registerForm"
            autocomplete="on">

            <div class="checkbox-group role-toggle">

                <label>

                    <input
                        type="radio"
                        name="registerRole"
                        id="roleStudent"
                        value="student"
                        checked>

                    학생

                </label>

                <label>

                    <input
                        type="radio"
                        name="registerRole"
                        id="roleTeacher"
                        value="teacher">

                    선생님

                </label>

            </div>

            <div class="form-group">

                <label for="registerEmail">

                    이메일

                </label>

                <input
                    id="registerEmail"
                    class="input"
                    type="email"
                    placeholder="이메일">

                <small
                    id="registerEmailMessage"
                    class="form-message">

                </small>

            </div>

            <div class="form-group">

                <label for="nickname">

                    닉네임

                </label>

                <input
                    id="nickname"
                    class="input"
                    maxlength="15"
                    placeholder="닉네임">

                <small
                    id="nicknameMessage"
                    class="form-message">

                </small>

            </div>

            <div class="form-group">

                <label for="registerPassword">

                    비밀번호

                </label>

                <div class="password-box">

                    <input
                        id="registerPassword"
                        class="input"
                        type="password"
                        placeholder="비밀번호">

                    <button
                        type="button"
                        id="toggleRegisterPassword"
                        class="password-toggle">

                        보기

                    </button>

                </div>

                <div
                    class="password-strength">

                    <div
                        id="registerStrengthBar"
                        class="password-strength-bar">

                    </div>

                </div>

                <small
                    id="registerStrengthText"
                    class="form-message">

                </small>

            </div>

            <div class="form-group">

                <label for="confirmPassword">

                    비밀번호 확인

                </label>

                <input
                    id="confirmPassword"
                    class="input"
                    type="password"
                    placeholder="비밀번호 다시 입력">

                <small
                    id="confirmPasswordMessage"
                    class="form-message">

                </small>

            </div>
                        <div class="form-row" id="studentFields">

                <div class="form-group">

                    <label for="grade">

                        학년

                    </label>

                    <select
                        id="grade"
                        class="input">

                        <option value="">

                            선택

                        </option>

                        <option value="1">

                            1학년

                        </option>

                        <option value="2">

                            2학년

                        </option>

                        <option value="3">

                            3학년

                        </option>

                    </select>

                </div>

                <div class="form-group">

                    <label for="classNumber">

                        반

                    </label>

                    <input
                        id="classNumber"
                        class="input"
                        type="number"
                        min="1"
                        max="10"
                        placeholder="반">

                </div>

                <div class="form-group">

                    <label for="studentNumber">

                        번호

                    </label>

                    <input
                        id="studentNumber"
                        class="input"
                        type="number"
                        min="1"
                        max="32"
                        placeholder="번호">

                </div>

            </div>

            <div class="form-group hidden" id="teacherFields">

                <label for="teacherCode">

                    선생님 추천코드

                </label>

                <input
                    id="teacherCode"
                    class="input"
                    type="text"
                    placeholder="선생님 추천코드를 입력하세요">

                <small
                    id="teacherCodeMessage"
                    class="form-message">

                </small>

            </div>

            <div class="form-group">

                <label for="bio">

                    자기소개 (선택)

                </label>

                <textarea
                    id="bio"
                    class="input"
                    rows="4"
                    maxlength="100"
                    placeholder="간단한 자기소개를 입력하세요.">

                </textarea>

                <small
                    id="bioCount"
                    class="form-message">

                    0 / 100

                </small>

            </div>

            <div class="checkbox-group">

                <label>

                    <input
                        id="agreeTerms"
                        type="checkbox">

                    이용약관에 동의합니다.

                </label>

            </div>

            <div class="checkbox-group">

                <label>

                    <input
                        id="agreePrivacy"
                        type="checkbox">

                    개인정보 처리방침에 동의합니다.

                </label>

            </div>

            <button
                id="registerButton"
                class="btn w-100 mt-20"
                type="submit">

                회원가입

            </button>

            <div class="login-links">

                <span>

                    이미 계정이 있으신가요?

                </span>

                <a
                    href="login.html">

                    로그인

                </a>

            </div>
                    </form>

        <div class="card register-success hidden" id="registerSuccess">

            <div class="register-success-icon">📩</div>

            <h2>회원가입 신청이 완료되었습니다</h2>

            <p>
                입력하신 이메일로 인증 메일을 보냈어요.
                <strong>메일함(스팸함 포함)에서 인증 링크를 눌러야</strong>
                로그인할 수 있습니다.
            </p>

            <a href="login.html" class="btn w-100 mt-20">로그인 화면으로 이동</a>

        </div>

        <div class="login-footer">

            <p>

                © 2026 Taecker · 태성고등학교 학생 커뮤니티

            </p>

        </div>

    </div>

</div>

<div
    id="registerLoader"
    class="loader-overlay hidden">

    <div class="loader"></div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="js/app.js"></script>

<script src="js/auth.js"></script>

<script>

const registerForm=document.getElementById("registerForm");

const email=document.getElementById("registerEmail");

const nickname=document.getElementById("nickname");

const password=document.getElementById("registerPassword");

const confirmPassword=document.getElementById("confirmPassword");

const grade=document.getElementById("grade");

const classNumber=document.getElementById("classNumber");

const studentNumber=document.getElementById("studentNumber");

const bio=document.getElementById("bio");

const agreeTerms=document.getElementById("agreeTerms");

const agreePrivacy=document.getElementById("agreePrivacy");

const bioCount=document.getElementById("bioCount");

const togglePasswordBtn=document.getElementById("toggleRegisterPassword");

const registerButton=document.getElementById("registerButton");

const registerEmailMessage=document.getElementById("registerEmailMessage");

const nicknameMessage=document.getElementById("nicknameMessage");

const confirmPasswordMessage=document.getElementById("confirmPasswordMessage");

const registerStrengthBar=document.getElementById("registerStrengthBar");

const registerStrengthText=document.getElementById("registerStrengthText");

const roleStudent=document.getElementById("roleStudent");

const roleTeacher=document.getElementById("roleTeacher");

const studentFields=document.getElementById("studentFields");

const teacherFields=document.getElementById("teacherFields");

const teacherCode=document.getElementById("teacherCode");

const teacherCodeMessage=document.getElementById("teacherCodeMessage");

function isTeacherRole(){

    return !!(roleTeacher && roleTeacher.checked);

}

function updateRoleFields(){

    const teacher=isTeacherRole();

    studentFields?.classList.toggle("hidden",teacher);

    teacherFields?.classList.toggle("hidden",!teacher);

}

roleStudent?.addEventListener("change",updateRoleFields);

roleTeacher?.addEventListener("change",updateRoleFields);

updateRoleFields();
  email.addEventListener("input",()=>{

    const value=email.value.trim();

    if(value===""){

        registerEmailMessage.textContent="";

        return;

    }

    const valid=/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value);

    registerEmailMessage.textContent=

        valid

        ?"올바른 이메일입니다."

        :"이메일 형식을 확인하세요.";

    registerEmailMessage.style.color=

        valid

        ?"#16A34A"

        :"#DC2626";

});

nickname.addEventListener("input",()=>{

    const value=nickname.value.trim();

    if(value.length<2){

        nicknameMessage.textContent=

            "닉네임은 2자 이상 입력해주세요.";

        nicknameMessage.style.color="#DC2626";

        return;

    }

    if(value.length>15){

        nicknameMessage.textContent=

            "닉네임은 15자 이하입니다.";

        nicknameMessage.style.color="#DC2626";

        return;

    }

    nicknameMessage.textContent=

        "사용 가능한 길이입니다.";

    nicknameMessage.style.color="#16A34A";

});

togglePasswordBtn.addEventListener("click",()=>{

    const hidden=password.type==="password";

    password.type=

        hidden

        ?"text"

        :"password";

    togglePasswordBtn.textContent=

        hidden

        ?"숨기기"

        :"보기";

});

password.addEventListener("input",()=>{

    const value=password.value;

    let score=0;

    if(value.length>=6) score++;

    if(/[A-Z]/.test(value)) score++;

    if(/[0-9]/.test(value)) score++;

    if(/[^A-Za-z0-9]/.test(value)) score++;

    const width=(score/4)*100;

    registerStrengthBar.style.width=

        width+"%";

    const texts=[

        "매우 약함",

        "약함",

        "보통",

        "강함",

        "매우 강함"

    ];

    registerStrengthText.textContent=

        texts[score];

});

confirmPassword.addEventListener("input",()=>{

    if(confirmPassword.value===""){

        confirmPasswordMessage.textContent="";

        return;

    }

    const same=

        confirmPassword.value===

        password.value;

    confirmPasswordMessage.textContent=

        same

        ?"비밀번호가 일치합니다."

        :"비밀번호가 일치하지 않습니다.";

    confirmPasswordMessage.style.color=

        same

        ?"#16A34A"

        :"#DC2626";

});

bio.addEventListener("input",()=>{

    bioCount.textContent=

        bio.value.length+

        " / 100";

});
  async function checkNickname(){

    const {data}=

    await window.sb

    .from("profiles")

    .select("nickname")

    .eq("nickname",nickname.value.trim())

    .maybeSingle();

    return !data;

}

async function checkStudentId(){

    const {data}=

    await window.sb

    .from("profiles")

    .select("id")

    .eq("grade",Number(grade.value))

    .eq("class_number",Number(classNumber.value))

    .eq("student_number",String(Number(studentNumber.value)))

    .maybeSingle();

    return !data;

}

registerForm.addEventListener(

    "submit",

    async(event)=>{

        event.preventDefault();

        if(!agreeTerms.checked){

            toast(

                "이용약관에 동의해주세요."

            );

            return;

        }

        if(!agreePrivacy.checked){

            toast(

                "개인정보 처리방침에 동의해주세요."

            );

            return;

        }

        if(

            password.value!==

            confirmPassword.value

        ){

            toast(

                "비밀번호가 일치하지 않습니다."

            );

            return;

        }

        if(password.value.length<6){

            toast(

                "비밀번호는 6자 이상 입력해주세요."

            );

            return;

        }

        const teacher=isTeacherRole();

        if(teacher && !teacherCode.value.trim()){

            toast(

                "선생님 추천코드를 입력해주세요."

            );

            teacherCode.focus();

            return;

        }

        showLoader();

        registerButton.disabled=true;

        try{

            const available=

                await checkNickname();

            if(!available){

                throw new Error(

                    "이미 사용 중인 닉네임입니다."

                );

            }

            if(!teacher){

                const studentIdAvailable=

                    await checkStudentId();

                if(!studentIdAvailable){

                    throw new Error(

                        "이미 가입된 학번입니다. 본인 계정이 맞다면 로그인해주세요."

                    );

                }

            }

            if(teacher){

                const {data:codeOk,error:codeError}=

                    await window.sb.rpc(

                        "redeem_teacher_code",

                        {p_code:teacherCode.value.trim()}

                    );

                if(codeError){

                    throw codeError;

                }

                if(!codeOk){

                    throw new Error(

                        "잘못된 코드이거나 이미 사용된 추천코드입니다."

                    );

                }

            }

            const {

            data,

                error

            }=

            await window.sb.auth.signUp({

                email:

                    email.value.trim(),

                password:

                    password.value,

                options:{

                    data: teacher ? {

                        nickname:

                            nickname.value.trim(),

                        is_teacher:

                            true,

                        grade:

                            null,

                        class_number:

                            null,

                        student_number:

                            null,

                        bio:

                            bio.value.trim()

                    } : {

                        nickname:

                            nickname.value.trim(),

                        is_teacher:

                            false,

                        grade:

                            Number(grade.value),

                        class_number:

                            Number(classNumber.value),

                        student_number:

                            Number(studentNumber.value),

                        bio:

                            bio.value.trim()

                    }

                }

            });

            if(error){

                throw error;

            }

            toast(

                "회원가입이 완료되었습니다."

            );

            registerForm.classList.add("hidden");

            document.getElementById("registerSuccess")

                ?.classList.remove("hidden");

        }

        catch(error){

            console.error(error);

            toast(

                error.message||

                "회원가입에 실패했습니다."

            );

        }

        finally{

            hideLoader();

            registerButton.disabled=false;

        }

    }

);
  /* =====================================================
   INIT
===================================================== */

window.addEventListener(

    "load",

    ()=>{

        email.focus();

    }

);

document.addEventListener(

    "keydown",

    (event)=>{

        if(

            event.key==="Enter" &&

            document.activeElement===confirmPassword

        ){

            registerForm.requestSubmit();

        }

    }

);

</script>

</body>

</html>
