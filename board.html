<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>게시판 | 태커</title>
<meta name="description" content="태성고등학교 학생들의 자유게시판, 질문게시판, 정보게시판을 한곳에서 확인하세요.">
<meta name="theme-color" content="#2563EB">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="init-loader" id="initLoader" aria-hidden="true">
        <span class="init-loader-mark">태커</span>
        <span class="init-loader-spinner"></span>
    </div>


<!-- =====================================================
     HEADER
===================================================== -->
<header class="header">

    <div class="header-left">
        <button class="nav-toggle" id="menuBtn" aria-label="메뉴 열기">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                <path d="M3 6H21M3 12H21M3 18H21" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>

        <a href="index.html" class="brand">
            <h1>태커</h1>
            <span>태성고등학교 커뮤니티</span>
        </a>
    </div>

    <div class="header-search" id="headerSearchWrap">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
            <path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <input
            type="search"
            id="searchInput"
            class="header-search-input"
            placeholder="게시글 검색"
            autocomplete="off">
    </div>

    <div class="header-actions">

        <button class="icon-btn header-search-toggle" id="searchToggleBtn" aria-label="검색">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="11" cy="11" r="7" stroke="currentColor" stroke-width="2"/>
                <path d="M20 20L16.5 16.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>

        <button class="icon-btn" id="themeToggleBtn" aria-label="다크모드 전환">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2"/>
                <path d="M12 2V4M12 20V22M4 12H2M22 12H20M5 5L6.5 6.5M18 18L19.5 19.5M19.5 5L18 6.5M6.5 18L5 19.5" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
        </button>

        <div class="dropdown" id="notifDropdown">
            <button class="icon-btn dropdown-trigger" id="notifBtn" aria-haspopup="true" aria-expanded="false" aria-label="알림">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                    <path d="M15 17H20L18.5 15.5V10C18.5 6.96 16.54 4.36 13.75 3.45V3C13.75 2.03 12.97 1.25 12 1.25C11.03 1.25 10.25 2.03 10.25 3V3.45C7.46 4.36 5.5 6.96 5.5 10V15.5L4 17H9" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M9 17C9 18.66 10.34 20 12 20C13.66 20 15 18.66 15 17" stroke="currentColor" stroke-width="2"/>
                </svg>
                <span class="badge-dot hidden" id="notifBadge"></span>
            </button>

            <div class="dropdown-menu dropdown-menu-right" id="notifMenu">
                <div class="dropdown-header">알림</div>
                <div class="dropdown-empty" id="notifEmpty">
                    <p>새로운 알림이 없습니다.</p>
                </div>
                <div class="dropdown-list hidden" id="notifList"></div>
            </div>
        </div>

        <button class="btn btn-write" id="headerWriteBtn">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
            </svg>
            <span>글쓰기</span>
        </button>

        <div class="auth-area" id="authArea">
            <a href="login.html" class="btn btn-ghost">로그인</a>
            <a href="register.html" class="btn">회원가입</a>
        </div>

        <div class="dropdown hidden" id="profileDropdown">
            <button class="profile-trigger" id="profileBtn" aria-haspopup="true" aria-expanded="false">
                <span class="avatar-sm" id="headerAvatar">
                    <img src="" alt="" id="headerAvatarImg" class="hidden">
                    <span id="headerAvatarInitial">태</span>
                </span>
                <span class="profile-trigger-name" id="headerNickname">회원</span>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none">
                    <path d="M6 9L12 15L18 9" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>

            <div class="dropdown-menu dropdown-menu-right" id="profileMenu">
                <div class="dropdown-profile-summary">
                    <span class="avatar-sm avatar-sm-lg">
                        <img src="" alt="" id="menuAvatarImg" class="hidden">
                        <span id="menuAvatarInitial">태</span>
                    </span>
                    <div>
                        <p class="dropdown-profile-name" id="menuNickname">회원</p>
                        <p class="dropdown-profile-email" id="menuEmail">-</p>
                    </div>
                </div>
                <div class="dropdown-divider"></div>
                <a href="mypage.html" class="dropdown-item">마이페이지</a>
                <a href="#" class="dropdown-item" data-soon="설정 기능은 준비 중입니다.">설정</a>
                <div class="dropdown-divider"></div>
                <button class="dropdown-item dropdown-item-danger" id="logoutBtn">로그아웃</button>
            </div>
        </div>

    </div>

</header>

<!-- =====================================================
     SIDEBAR
===================================================== -->
<aside class="sidebar" id="sidebar">
    <nav>
        <ul>
            <li><a href="index.html">홈</a></li>
            <li class="sidebar-group">
                <button type="button" class="sidebar-group-toggle active" aria-expanded="true">
                    <span>게시판</span>
                    <svg class="sidebar-chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
                </button>
                <ul class="sidebar-submenu">
                    <li><a href="board.html">전체보기</a></li>
                    <li><a href="board.html?category=notice">공지사항</a></li>
                    <li><a href="board.html?category=free">자유게시판</a></li>
                    <li><a href="board.html?category=question">질문게시판</a></li>
                    <li><a href="board.html?category=info">정보게시판</a></li>
                    <li><a href="board.html?category=grade">학년별 게시판</a></li>
                </ul>
            </li>
            <li><a href="school.html?tab=timetable">시간표</a></li>
            <li><a href="school.html?tab=meal">급식</a></li>
            <li><a href="school.html?tab=schedule">학사일정</a></li>
            <li><a href="mypage.html">마이페이지</a></li>
            <li><a href="inquiry.html">문의하기</a></li>
        </ul>
    </nav>
</aside>

<!-- =====================================================
     MAIN
===================================================== -->
<main class="container">

    <section class="board-title">
        <h2 id="boardTitle">게시판</h2>
        <p id="boardSubtitle">태성고등학교 학생들과 자유롭게 이야기를 나눠보세요.</p>
    </section>

    <section class="category-bar" id="boardCategoryBar">
        <button class="chip" data-category=""><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><rect x="3" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="2"/><rect x="13" y="3" width="8" height="8" rx="2" stroke="currentColor" stroke-width="2"/><rect x="3" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="2"/><rect x="13" y="13" width="8" height="8" rx="2" stroke="currentColor" stroke-width="2"/></svg>전체</button>
        <button class="chip" data-category="notice"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M3 10V14C3 15.1 3.9 16 5 16H6L9 20V4L6 8H5C3.9 8 3 8.9 3 10Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M13 8C14.5 9 15.5 10.4 15.5 12C15.5 13.6 14.5 15 13 16" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>공지사항</button>
        <button class="chip" data-category="free"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M4 5H20V16H8L4 19V5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>자유게시판</button>
        <button class="chip" data-category="question"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M9.5 9.5C9.5 8 10.6 7 12 7C13.4 7 14.5 8 14.5 9.3C14.5 10.5 13.7 11 12.8 11.5C12.2 11.9 12 12.3 12 13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><circle cx="12" cy="16" r="1" fill="currentColor"/></svg>질문게시판</button>
        <button class="chip" data-category="info"><svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M9 18H15" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M10 21H14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M12 3C8.7 3 6 5.7 6 9C6 11.2 7.2 12.6 8.3 13.7C8.9 14.3 9 15 9 15.5V16H15V15.5C15 15 15.1 14.3 15.7 13.7C16.8 12.6 18 11.2 18 9C18 5.7 15.3 3 12 3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/></svg>정보게시판</button>
    </section>

    <div class="feed-toolbar">
        <div class="feed-tabs" id="boardFeedTabs">
            <button class="feed-tab active" data-sort="latest">최신순</button>
            <button class="feed-tab" data-sort="popular">인기순</button>
        </div>
        <span class="feed-count" id="boardFeedCount"></span>
    </div>

    <div class="post-list" id="boardPostList">
        <div class="skeleton-post" aria-hidden="true">
            <div class="skeleton-line skeleton-line-sm"></div>
            <div class="skeleton-line skeleton-line-lg"></div>
            <div class="skeleton-line skeleton-line-md"></div>
        </div>
        <div class="skeleton-post" aria-hidden="true">
            <div class="skeleton-line skeleton-line-sm"></div>
            <div class="skeleton-line skeleton-line-lg"></div>
            <div class="skeleton-line skeleton-line-md"></div>
        </div>
        <div class="skeleton-post" aria-hidden="true">
            <div class="skeleton-line skeleton-line-sm"></div>
            <div class="skeleton-line skeleton-line-lg"></div>
            <div class="skeleton-line skeleton-line-md"></div>
        </div>
        <div class="skeleton-post" aria-hidden="true">
            <div class="skeleton-line skeleton-line-sm"></div>
            <div class="skeleton-line skeleton-line-lg"></div>
            <div class="skeleton-line skeleton-line-md"></div>
        </div>
    </div>

    <nav class="pagination hidden" id="boardPagination" aria-label="게시글 페이지 이동"></nav>

</main>

<button class="fab" id="writeBtn" aria-label="글쓰기">
    <svg width="26" height="26" viewBox="0 0 24 24" fill="none">
        <path d="M12 5V19M5 12H19" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    </svg>
</button>

    </a>

    <a href="board.html" class="active">

        </svg>
        <span>게시판</span>

    <a href="school.html?tab=timetable">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <rect x="4" y="4" width="16" height="16" rx="2" stroke="currentColor" stroke-width="2"/>
            <path d="M8 8H16M8 12H16M8 16H13" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>시간표</span>
    </a>

    <a href="#" id="bottomNavMy">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none">

            <path d="M4 20C4 16.7 7.6 14 12 14C16.4 14 20 16.7 20 20" stroke="currentColor" stroke-width="2"/>
        </svg>
        <span>마이</span>
    </a>
</nav>
